groups:
- name: CPUUtilisationHigh
  rules:
  - alert: CPUUtilisationHigh
    expr: 100 - (avg by (instance, name) (rate(node_cpu_seconds_total{mode="idle"}[5m]) * 100)) > 0.01
    for: 1m
    labels:
      severity: 'critical'
    annotations:
      summary: CPU Utilisation is high

# PromQL Query for network usage
# 8 * (
#     sum by (instance, name)(irate(node_network_receive_bytes_total[5m]))
#     +
#     sum by (instance, name)(irate(node_network_transmit_bytes_total[5m]))
#   )

# PromQL for disk usage
# 100 - ((node_filesystem_avail_bytes{mountpoint="/"} * 100 ) / node_filesystem_size_bytes{mountpoint="/"})

# PromQL for memory usage
# (node_memory_MemFree_bytes / node_memory_MemTotal_bytes) * 100



